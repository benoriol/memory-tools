<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>memory-graph viewer</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161a21;
    --panel-2: #1d2230;
    --text: #d7dae0;
    --muted: #8a8f9c;
    --accent: #6aa1ff;
    --border: #262b36;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
               font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
               overflow: hidden; }
  /* Explicit single row + grid items allowed to shrink below content size,
     so the central #network cell gets the full viewport height instead of
     collapsing to whatever the side panels happen to contain. */
  #app { display: grid; grid-template-columns: 280px 1fr 380px;
         grid-template-rows: 100vh; height: 100vh; }
  .col { overflow: auto; border-right: 1px solid var(--border);
         min-width: 0; min-height: 0; }
  .col:last-child { border-right: 0; border-left: 1px solid var(--border); }
  #network { background: #0b0d11; min-width: 0; min-height: 0;
             width: 100%; height: 100%; }
  h1, h2, h3 { font-weight: 600; }
  h1 { font-size: 14px; margin: 16px; letter-spacing: 0.04em; text-transform: uppercase;
       color: var(--muted); }
  h2 { font-size: 13px; margin: 12px 16px 6px; color: var(--muted); }
  h3 { font-size: 14px; margin: 0 0 6px 0; }
  .stats, .filters, .details { padding: 0 16px 12px; font-size: 13px; line-height: 1.5; }
  .stats .row { display: flex; justify-content: space-between; padding: 2px 0; }
  .stats .row .k { color: var(--muted); }
  .filters label { display: block; padding: 3px 0; cursor: pointer; user-select: none; }
  .filters input[type=checkbox] { margin-right: 6px; vertical-align: -2px; }
  .filters .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%;
                     margin-right: 6px; vertical-align: middle; }
  .search { width: calc(100% - 32px); margin: 8px 16px 12px; padding: 6px 8px;
            background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
            border-radius: 4px; outline: none; }
  .search:focus { border-color: var(--accent); }
  .details .pill { display: inline-block; padding: 2px 6px; margin-right: 4px;
                   border-radius: 3px; background: var(--panel-2); font-size: 11px;
                   color: var(--muted); }
  .details .title { font-size: 15px; font-weight: 600; margin: 4px 0 8px; }
  .details .summary { color: var(--text); margin-bottom: 12px; }
  .details .body { white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo,
                   monospace; font-size: 12px; background: var(--panel-2); padding: 10px;
                   border-radius: 4px; max-height: 38vh; overflow: auto; }
  .details .edges { margin-top: 12px; }
  .details .edges .edge { font-size: 12px; padding: 2px 0; }
  .details .edges .edge .t { color: var(--muted); margin-right: 6px; }
  .empty { color: var(--muted); padding: 12px 16px; font-style: italic; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .id { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; }

  /* Center column = view toggle + graph OR list. Class on #main switches. */
  #main { display: flex; flex-direction: column; min-width: 0; min-height: 0;
          background: #0b0d11; }
  #view-toggle { flex: 0 0 auto; display: flex; gap: 6px; padding: 8px 12px;
                 border-bottom: 1px solid var(--border); }
  #view-toggle button { background: transparent; color: var(--muted);
                        border: 1px solid var(--border); border-radius: 4px;
                        padding: 4px 12px; font: inherit; font-size: 12px;
                        cursor: pointer; }
  #view-toggle button:hover { color: var(--text); border-color: var(--muted); }
  #view-toggle button.active { background: var(--accent); color: #0b0d11;
                               border-color: var(--accent); }
  #view-toggle .count { color: var(--muted); margin-left: auto;
                        font-size: 12px; align-self: center; }
  #network, #list { flex: 1 1 auto; min-width: 0; min-height: 0; }
  #list { overflow: auto; padding: 6px 0; }
  #main.view-graph #list    { display: none; }
  #main.view-list  #network { display: none; }

  /* List rows */
  .row { padding: 10px 14px; border-bottom: 1px solid var(--border);
         cursor: pointer; }
  .row:hover { background: var(--panel); }
  .row.selected { background: var(--panel-2); border-left: 3px solid var(--accent);
                  padding-left: 11px; }
  .row .head { display: flex; gap: 8px; align-items: baseline;
               margin-bottom: 2px; }
  .row .kind-dot { width: 10px; height: 10px; border-radius: 50%;
                   flex: 0 0 auto; margin-top: 5px; }
  .row .title { font-weight: 600; flex: 1 1 auto;
                white-space: nowrap; overflow: hidden;
                text-overflow: ellipsis; min-width: 0; }
  .row .meta { color: var(--muted); font-size: 11px; flex: 0 0 auto; }
  .row .sum { color: var(--muted); font-size: 12px; line-height: 1.4;
              margin-left: 18px;
              display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
              overflow: hidden; }
  .row .status-tag { font-size: 10px; padding: 1px 5px;
                     border-radius: 3px; background: var(--panel-2);
                     color: var(--muted); margin-left: 4px; }
</style>
</head>
<body>
<div id="app">

  <div class="col" id="left">
    <h1>memory-graph</h1>
    <h2>store</h2>
    <div class="stats" id="stats">loading…</div>

    <h2>filter by kind</h2>
    <div class="filters" id="kind-filters"></div>

    <h2>filter by status</h2>
    <div class="filters" id="status-filters"></div>

    <h2>search</h2>
    <input class="search" id="search" placeholder="title or summary…" />
  </div>

  <div id="main" class="view-graph">
    <div id="view-toggle">
      <button class="active" data-view="graph">Graph</button>
      <button data-view="list">List</button>
      <span class="count" id="view-count"></span>
    </div>
    <div id="network"></div>
    <div id="list"></div>
  </div>

  <div class="col" id="right">
    <h1>note</h1>
    <div class="details" id="details">
      <div class="empty">click a node to see its content.</div>
    </div>
  </div>

</div>

<script>
// ---- palette --------------------------------------------------------------

// Kind is now free-text. Color a handful of common labels; fall back to
// a hash-based color for anything else so unknown labels still get a
// stable, distinct color.
const KIND_COLORS = {
  observation: "#9aa4b4",
  experiment:  "#f5a25d",
  principle:   "#7ee787",
  decision:    "#c084fc",
  mistake:     "#f87171",
  bug_fix:     "#5eead4",
  former_state:"#b08968",
  user_said:   "#facc15",
  // legacy kinds from v1 stores — same colors so existing notes stay readable
  capture:     "#9aa4b4",
  lesson:      "#6aa1ff",
  reference:   "#5eead4",
  incident:    "#f87171",
  transition:  "#f0abfc",
  archaeology: "#b08968",
  next_step:   "#facc15",
};
const DEFAULT_COLOR = "#9aa4b4";

function kindColor(kind) {
  if (!kind) return DEFAULT_COLOR;
  if (kind in KIND_COLORS) return KIND_COLORS[kind];
  // Deterministic hash → HSL for unknown labels.
  let h = 0;
  for (let i = 0; i < kind.length; i++) h = (h * 31 + kind.charCodeAt(i)) >>> 0;
  return `hsl(${h % 360}, 55%, 65%)`;
}

// Edge palette — v2's three edge types plus legacy fallbacks for stores
// that haven't been re-migrated yet (the index.db migrates on open, but
// a viz hitting a snapshot file could still see old types).
const EDGE_COLORS = {
  abstracts:    "#6aa1ff",   // up/down the abstraction ladder
  related:      "#5b6172",   // lateral
  supersedes:   "#f5a25d",   // lifecycle (also dashes in the viz)
  // v1 fallbacks — should never appear after migration, but harmless:
  generalizes:  "#6aa1ff", specializes: "#6aa1ff",
  derived_from: "#6aa1ff", supports: "#6aa1ff",
  contradicts:  "#f87171", corrects: "#f87171",
  coupled_with: "#c084fc", applies_to: "#5eead4",
  impacts:      "#facc15", informs: "#f0abfc",
  confirmed_by: "#7ee787",
};
const DEFAULT_EDGE_COLOR = "#3d4252";

// Style by status.
const STATUS_FONT = {
  superseded:  "#666b78",
  corrected:   "#666b78",
  disproven:   "#666b78",
  stale:       "#666b78",
  archived:    "#555a66",
  active:      "#d7dae0",
  validated:   "#d7dae0",
  unsure:      "#facc15",
  disputed:    "#f87171",
  open:        "#5eead4",
};

// ---- state ---------------------------------------------------------------

let G = null;          // raw graph JSON
let nodesDS, edgesDS;  // vis DataSets (current view)
let network = null;
let kindEnabled = new Set();
let statusEnabled = new Set();
let searchQ = "";
let selectedId = null; // currently selected note (highlighted in list + graph)

// ---- fetch + render ------------------------------------------------------

async function load() {
  const r = await fetch("/api/graph");
  if (!r.ok) { showError("failed to load /api/graph"); return; }
  G = await r.json();
  Object.keys(G.stats.by_kind).forEach(k => kindEnabled.add(k));
  // Status filter: enable all that appear in the data.
  const statusSet = new Set(G.nodes.map(n => n.status));
  statusSet.forEach(s => statusEnabled.add(s));
  renderStats();
  renderKindFilters();
  renderStatusFilters(statusSet);
  buildNetwork();
  applyFilter();
}

function showError(msg) {
  document.getElementById("stats").innerHTML =
    `<div class="empty" style="color:#f87171">${msg}</div>`;
}

function renderStats() {
  const el = document.getElementById("stats");
  const s = G.stats;
  let html = "";
  html += row("nodes", s.total_nodes);
  html += row("edges", s.total_edges);
  el.innerHTML = html;
}

function row(k, v) {
  return `<div class="row"><span class="k">${esc(k)}</span><span>${esc(v)}</span></div>`;
}

function renderKindFilters() {
  const el = document.getElementById("kind-filters");
  const counts = G.stats.by_kind;
  const kinds = Object.keys(counts).sort();
  el.innerHTML = kinds.map(k => {
    const color = kindColor(k);
    return `<label>
      <input type="checkbox" data-kind="${esc(k)}" checked />
      <span class="swatch" style="background:${color}"></span>
      ${esc(k)} <span style="color:var(--muted)">(${counts[k]})</span>
    </label>`;
  }).join("");
  el.querySelectorAll("input").forEach(cb => cb.addEventListener("change", e => {
    const k = e.target.dataset.kind;
    if (e.target.checked) kindEnabled.add(k); else kindEnabled.delete(k);
    applyFilter();
  }));
}

function renderStatusFilters(statusSet) {
  const el = document.getElementById("status-filters");
  const statuses = [...statusSet].sort();
  el.innerHTML = statuses.map(s => `<label>
    <input type="checkbox" data-status="${esc(s)}" checked />
    <span class="swatch" style="background:${STATUS_FONT[s] || '#9aa4b4'}"></span>
    ${esc(s)}
  </label>`).join("");
  el.querySelectorAll("input").forEach(cb => cb.addEventListener("change", e => {
    const s = e.target.dataset.status;
    if (e.target.checked) statusEnabled.add(s); else statusEnabled.delete(s);
    applyFilter();
  }));
}

document.getElementById("search").addEventListener("input", e => {
  searchQ = e.target.value.trim().toLowerCase();
  applyFilter();
});

// View toggle (graph <-> list)
document.querySelectorAll("#view-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    const view = btn.dataset.view;
    document.querySelectorAll("#view-toggle button")
      .forEach(b => b.classList.toggle("active", b === btn));
    const main = document.getElementById("main");
    main.classList.toggle("view-graph", view === "graph");
    main.classList.toggle("view-list", view === "list");
    // vis-network can mis-render after being hidden then shown — nudge it.
    if (view === "graph" && network) network.redraw();
  });
});

function buildNetwork() {
  const container = document.getElementById("network");
  nodesDS = new vis.DataSet([]);
  edgesDS = new vis.DataSet([]);
  // Hierarchical layout: more-abstract nodes on top, more-concrete below.
  // The level for each node is derived from the `abstracts` edge structure
  // (see computeLevels() called from applyFilter). `related` edges don't
  // contribute to the hierarchy; they're laid on top semi-transparently.
  network = new vis.Network(container, { nodes: nodesDS, edges: edgesDS }, {
    layout: {
      hierarchical: {
        enabled: true,
        direction: "UD",            // up→down: abstract on top, concrete below
        sortMethod: "directed",
        levelSeparation: 110,
        nodeSpacing: 160,
        treeSpacing: 220,
        blockShifting: true,
        edgeMinimization: true,
        parentCentralization: true,
      },
    },
    nodes: {
      shape: "dot",
      size: 12,
      borderWidth: 0,
      font: { color: "#d7dae0", size: 13, face: "system-ui" },
    },
    edges: {
      smooth: { type: "cubicBezier", forceDirection: "vertical", roundness: 0.4 },
      arrows: { to: { enabled: true, scaleFactor: 0.5 } },
      font: { color: "#8a8f9c", size: 10, align: "middle", strokeWidth: 0,
              background: "#0b0d11" },
    },
    physics: {
      // Hierarchical layout disables physics by default; keep it light
      // for the gentle settling animation.
      enabled: true,
      hierarchicalRepulsion: { nodeDistance: 140, damping: 0.4 },
      stabilization: { iterations: 220 },
    },
    interaction: { hover: true, tooltipDelay: 200 },
  });
  network.on("click", params => {
    if (params.nodes && params.nodes.length) {
      selectNote(params.nodes[0]);
    }
  });
}

// Compute the vertical level for each node from the abstracts edge DAG.
// Roots (no incoming abstracts) get level 0; each step down adds 1. Nodes
// not touched by any abstracts edge sink to the bottom so they don't
// clutter the top with floating "isolated" leaves.
function computeLevels(visibleNodes, visibleEdges) {
  const outAbs = {};                 // from -> [tos]
  const inAbs = {};                  // to   -> [froms]
  for (const e of visibleEdges) {
    if (e.type !== "abstracts") continue;
    (outAbs[e.from] = outAbs[e.from] || []).push(e.to);
    (inAbs[e.to] = inAbs[e.to] || []).push(e.from);
  }
  // BFS from roots, taking max depth for nodes with multiple parents.
  const levels = {};
  const queue = [];
  for (const n of visibleNodes) {
    if (!(n.id in inAbs)) {
      levels[n.id] = 0;
      queue.push(n.id);
    }
  }
  while (queue.length) {
    const id = queue.shift();
    for (const child of outAbs[id] || []) {
      const candidate = (levels[id] || 0) + 1;
      if (candidate > (levels[child] ?? -1)) {
        levels[child] = candidate;
        queue.push(child);
      }
    }
  }
  // Sink isolated nodes (untouched by abstracts) to a floor below the deepest.
  const maxLevel = Math.max(0, ...Object.values(levels));
  for (const n of visibleNodes) {
    if (!(n.id in levels)) levels[n.id] = maxLevel + 1;
  }
  return levels;
}

function applyFilter() {
  if (!G || !network) return;
  const matches = n => {
    if (!kindEnabled.has(n.kind)) return false;
    if (!statusEnabled.has(n.status)) return false;
    if (searchQ && !(
      (n.title || "").toLowerCase().includes(searchQ) ||
      (n.summary || "").toLowerCase().includes(searchQ)
    )) return false;
    return true;
  };
  const visibleNodes = G.nodes.filter(matches);
  const visibleIds = new Set(visibleNodes.map(n => n.id));
  const visibleEdges = G.edges.filter(
    e => visibleIds.has(e.from) && visibleIds.has(e.to)
  );
  const levels = computeLevels(visibleNodes, visibleEdges);
  const nextNodes = visibleNodes.map(n => ({
    id: n.id,
    label: shortLabel(n.title || n.id),
    title: tooltipFor(n),
    color: kindColor(n.kind),
    font: { color: STATUS_FONT[n.status] || "#d7dae0" },
    level: levels[n.id] ?? 0,
  }));
  // `abstracts` and `supersedes` are the load-bearing structural edges;
  // they stay opaque and drive the hierarchical layout. `related` is
  // lateral, so it's drawn semi-transparently on top and (in vis-network's
  // hierarchical layout) doesn't influence levels because we computed
  // them ourselves above from abstracts only.
  const nextEdges = visibleEdges.map((e, i) => {
    const isStructural = e.type === "abstracts" || e.type === "supersedes";
    const baseColor = EDGE_COLORS[e.type] || DEFAULT_EDGE_COLOR;
    return {
      id: "e" + i,
      from: e.from,
      to: e.to,
      label: e.type,
      color: {
        color: baseColor,
        opacity: isStructural ? 1.0 : 0.35,
        highlight: baseColor,
        hover: baseColor,
      },
      dashes: e.type === "supersedes" ? [6, 4] : false,
      smooth: isStructural ? undefined : { type: "curvedCW", roundness: 0.25 },
    };
  });
  nodesDS.clear(); nodesDS.add(nextNodes);
  edgesDS.clear(); edgesDS.add(nextEdges);
  renderList(visibleNodes);
  document.getElementById("view-count").textContent =
    `${visibleNodes.length} / ${G.nodes.length}`;
}

function renderList(nodes) {
  // Sort: most-recently-updated first, ties broken by id (newer ULID wins).
  const sorted = nodes.slice().sort((a, b) => {
    const ua = a.updated_at || a.created_at || 0;
    const ub = b.updated_at || b.created_at || 0;
    if (ua !== ub) return ub - ua;
    return (b.id || "").localeCompare(a.id || "");
  });
  const el = document.getElementById("list");
  if (!sorted.length) {
    el.innerHTML = `<div class="empty">no notes match the current filters.</div>`;
    return;
  }
  el.innerHTML = sorted.map(n => {
    const color = kindColor(n.kind);
    const date = n.updated_at
      ? new Date(n.updated_at).toISOString().slice(0, 10)
      : "";
    const selected = n.id === selectedId ? " selected" : "";
    return `
      <div class="row${selected}" data-id="${esc(n.id)}">
        <div class="head">
          <span class="kind-dot" style="background:${color}"></span>
          <span class="title">${esc(n.title || n.id)}</span>
          <span class="meta">${esc(n.kind)}
            ${n.status && n.status !== "active"
              ? `<span class="status-tag">${esc(n.status)}</span>` : ""}
            ${date ? ` · ${esc(date)}` : ""}</span>
        </div>
        <div class="sum">${esc(n.summary || "")}</div>
      </div>`;
  }).join("");
  el.querySelectorAll(".row").forEach(row => {
    row.addEventListener("click", () => {
      selectNote(row.dataset.id);
    });
  });
}

function selectNote(id) {
  selectedId = id;
  // Highlight in list.
  document.querySelectorAll("#list .row").forEach(r =>
    r.classList.toggle("selected", r.dataset.id === id));
  // Highlight in graph (if visible there).
  if (network && nodesDS.get(id)) {
    network.selectNodes([id]);
  }
  loadNote(id);
}

function shortLabel(s) {
  if (!s) return "";
  s = s.trim();
  if (s.length <= 38) return s;
  return s.slice(0, 36) + "…";
}

function tooltipFor(n) {
  const div = document.createElement("div");
  div.innerHTML = `<div style="max-width:340px;font-family:system-ui">
    <div style="color:#9aa4b4;font-size:11px">${esc(n.kind)} · ${esc(n.status)}</div>
    <div style="font-weight:600;margin:2px 0">${esc(n.title || "")}</div>
    <div style="color:#d7dae0">${esc(n.summary || "")}</div>
    <div style="color:#666b78;font-size:10px;margin-top:4px;font-family:ui-monospace">
      ${esc(n.id)}
    </div>
  </div>`;
  return div;
}

async function loadNote(id) {
  const r = await fetch("/api/note/" + encodeURIComponent(id));
  if (!r.ok) {
    document.getElementById("details").innerHTML =
      `<div class="empty">could not load ${esc(id)}</div>`;
    return;
  }
  const n = await r.json();
  renderDetails(n);
}

function renderDetails(n) {
  const el = document.getElementById("details");
  const pills = [
    pill(n.kind, KIND_COLORS[n.kind]),
    pill(n.status, STATUS_FONT[n.status]),
    n.happened_at ? pill("happened: " + new Date(n.happened_at).toISOString().slice(0,10)) : "",
    n.last_verified_at ? pill("verified: " + new Date(n.last_verified_at).toISOString().slice(0,10)) : "",
  ].join("");
  const tags = (n.tags || []).map(t => pill("#" + t)).join("");
  const out = (n.edges || []).map(e => `
    <div class="edge"><span class="t">${esc(e.type)} →</span>
    <a href="#" data-id="${esc(e.to)}" class="id">${esc(e.to)}</a></div>
  `).join("");
  const inc = (n.incoming || []).map(e => `
    <div class="edge"><span class="t">${esc(e.type)} ←</span>
    <a href="#" data-id="${esc(e.from)}" class="id">${esc(e.from)}</a></div>
  `).join("");
  const anchors = (n.anchors || []).map(a => `
    <div class="edge"><span class="t">anchor:</span>
    <span class="id">${esc(a.path)}${a.pattern ? " : " + esc(a.pattern) : ""}</span></div>
  `).join("");
  el.innerHTML = `
    <div>${pills}</div>
    <div class="title">${esc(n.title || "(no title)")}</div>
    <div class="summary">${esc(n.summary || "")}</div>
    <div style="margin:6px 0">${tags}</div>
    <div class="body">${esc(n.body_markdown || "(no body)")}</div>
    ${out ? `<div class="edges"><h3>outgoing</h3>${out}</div>` : ""}
    ${inc ? `<div class="edges"><h3>incoming</h3>${inc}</div>` : ""}
    ${anchors ? `<div class="edges"><h3>anchors</h3>${anchors}</div>` : ""}
    <div class="edges"><h3>id</h3><div class="id">${esc(n.id)}</div></div>
  `;
  el.querySelectorAll("a[data-id]").forEach(a => {
    a.addEventListener("click", ev => {
      ev.preventDefault();
      const id = a.dataset.id;
      selectNote(id);
      if (network && nodesDS.get(id)) {
        network.focus(id, { scale: 1.2, animation: true });
      }
    });
  });
}

function pill(text, color) {
  if (!text) return "";
  const style = color ? ` style="color:${color}"` : "";
  return `<span class="pill"${style}>${esc(text)}</span>`;
}

function esc(s) {
  return String(s == null ? "" : s)
    .replaceAll("&", "&amp;").replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;").replaceAll('"', "&quot;");
}

load();
</script>
</body>
</html>
